          - list [ref=e70]:
            - listitem [ref=e71]: Melt butter with oil in a heavy pot over low heat. Add onions, bay leaves and thyme.
            - listitem [ref=e72]: Cook on low for 40 minutes, stirring every 5 minutes, until deep golden-brown and caramelised. Add sugar halfway through.
            - listitem [ref=e73]: Add garlic, cook 1 minute. Pour in wine and bubble for 3 minutes.
            - listitem [ref=e74]: Add beef stock, season and simmer 20 minutes.
            - listitem [ref=e75]: Ladle into oven-safe bowls. Place a baguette slice on top, pile with Gruyère.
